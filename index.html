<!doctype html>
<html class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Calm - Meditate</title>
    <meta
      name="description"
      content="Aura — A premium breathing guide and meditation visualizer for deep focus and calm."
    />
    <!-- favicon -->
    <link
      rel="icon"
      type="image/png"
      href="./favicon/favicon-96x96.png"
      sizes="96x96"
    />
    <link rel="icon" type="image/svg+xml" href="./favicon/favicon.svg" />
    <link rel="shortcut icon" href="./favicon/favicon.ico" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="./favicon/apple-touch-icon.png"
    />
    <link rel="manifest" href="./favicon/site.webmanifest" />

    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="Calm — 숨을 고르는 시간" />
    <meta
      property="og:description"
      content="숨 하나로 시작하는 고요함. 호흡 가이드와 잔잔한 피아노 선율로 깊은 집중과 평온을 경험하세요."
    />
    <meta
      property="og:image"
      content="https://imjhoon.github.io/soundscape/img/og_image.png"
    />
    <meta property="og:url" content="https://imjhoon.github.io/soundscape/" />
    <meta property="og:type" content="website" />

    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Calm - Immersive Meditation & Breathing"
    />
    <meta
      name="twitter:description"
      content="A premium breathing guide and meditation visualizer for deep focus and calm."
    />
    <meta name="twitter:image" content="./og_image.png" />

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@500;600&display=swap"
      rel="stylesheet"
    />

    <!-- Material Symbols -->
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Custom CSS -->
    <link href="style.css" rel="stylesheet" />

    <!-- Tailwind CSS (Play CDN) -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        corePlugins: { preflight: false },
        theme: {
          extend: {
            colors: {
              background: "#0F172A",
              surface: "#0F172A",
              "surface-container": "#1E293B",
              "surface-container-low": "#1E293B",
              "surface-container-highest": "#1E293B",
              "surface-variant": "#1E293B",
              "surface-dim": "#0F172A",
              "surface-bright": "#1E293B",
              "on-background": "#F8FAFC",
              "on-surface": "#F8FAFC",
              "on-surface-variant": "#F8FAFC",
              primary: "rgb(var(--color-primary))",
              "primary-container": "rgb(var(--color-primary))",
              "on-primary": "#0F172A",
              "on-primary-container": "#F8FAFC",
              secondary: "#1E293B",
              "secondary-container": "#1E293B",
              "on-secondary": "#F8FAFC",
              "on-secondary-container": "#38BDF8",
              tertiary: "#1E293B",
              "on-tertiary": "#F8FAFC",
              outline: "#475569",
              "outline-variant": "#334155",
              error: "#ffb4ab",
              "on-error": "#690005",
              "error-container": "#93000a",
              "on-error-container": "#ffdad6",
            },
            fontFamily: {
              "label-sm": ["Inter", "sans-serif"],
              "label-md": ["Inter", "sans-serif"],
              "body-md": ["Inter", "sans-serif"],
              "headline-sm": ["Playfair Display", "serif"],
              "display-lg-mobile": ["Playfair Display", "serif"],
              "display-lg": ["Playfair Display", "serif"],
              "headline-md": ["Playfair Display", "serif"],
              "body-lg": ["Inter", "sans-serif"],
            },
          },
        },
      };
    </script>
  </head>
  <body
    class="bg-background text-on-background min-vh-100 d-flex flex-column antialiased selection:bg-primary-container/30 selection:text-primary"
  >
    <!-- Ambient Background -->
    <div id="ambient-bg" class="ambient-layer aurora-bg"></div>

    <!-- Floating Particles -->
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>

    <!-- TopAppBar -->
    <header
      class="w-100 px-4 py-4 fixed-top z-50 d-flex justify-content-center pointer-events-none relative"
    >
      <!-- Minimal Centered Logo -->
      <h1
        class="font-headline-md fs-4 text-on-surface tracking-widest m-0 opacity-50"
        style="letter-spacing: 0.2em"
      >
        Calm
      </h1>
      <!-- Theme Palette Button -->
      <button
        class="position-absolute start-0 top-0 m-4 mt-3 btn p-2 border-0 text-white hover:text-primary transition-colors pointer-events-auto d-flex align-items-center justify-content-center"
        data-bs-toggle="modal"
        data-bs-target="#themeModal"
      >
        <span class="material-symbols-outlined fs-5" style="opacity: 0.9"
          >palette</span
        >
      </button>
    </header>

    <!-- Center Stage Main Content -->
    <main
      class="flex-grow-1 w-100 vh-100 d-flex flex-column align-items-center justify-content-center relative px-4 overflow-hidden"
    >
      <!-- Subtle background ambient light -->
      <div
        class="absolute inset-0 d-flex align-items-center justify-content-center pointer-events-none"
      >
        <div
          class="w-[800px] h-[800px] bg-primary-container/5 rounded-circle blur-[120px] opacity-50"
        ></div>
      </div>

      <div
        class="relative z-10 d-flex flex-column align-items-center justify-content-center w-100 mx-auto h-100 pt-[80px] pb-[120px] md:pb-[80px]"
      >
        <!-- The Breathing Orb with Ripple Rings -->
        <div class="orb-container fade-in-scale mb-4">
          <!-- Ripple Rings -->
          <div class="ripple-ring"></div>
          <div class="ripple-ring"></div>
          <div class="ripple-ring"></div>

          <!-- Main Orb -->
          <div
            id="breathing-orb"
            class="w-[65vw] h-[65vw] max-w-[380px] max-h-[380px] min-w-[200px] min-h-[200px] rounded-circle bg-surface-container/30 d-flex align-items-center justify-content-center relative animate-breathe mx-auto"
          >
            <!-- Inner Radial Glow -->
            <div class="orb-inner-glow"></div>

            <!-- Text Instruction -->
            <div class="z-20 text-center">
              <h2
                id="breathe-text"
                class="breathe-text font-display-lg display-6 md:display-5 text-on-surface tracking-wide m-0"
                style="text-shadow: 0 2px 15px rgba(0, 0, 0, 0.5)"
              >
                Breathe In...
              </h2>
            </div>
          </div>
        </div>

        <!-- Breathing Phase Indicator -->
        <p
          id="phase-label"
          class="font-label-sm text-on-surface-variant/60 tracking-[0.15em] text-uppercase mt-2 mb-4"
          style="font-size: 11px; letter-spacing: 0.2em"
        >
          INHALE
        </p>

        <!-- Breathing Pattern Chips -->
        <div
          class="d-flex align-items-center gap-2 mb-4 flex-wrap justify-content-center px-2"
        >
          <button
            class="pattern-chip active rounded-pill px-4 py-2 font-label-sm text-on-surface-variant border-0 text-center"
            data-pattern="simple"
            style="font-size: 13px"
          >
            Balance
          </button>
          <button
            class="pattern-chip rounded-pill px-4 py-2 font-label-sm text-on-surface-variant border-0 text-center"
            data-pattern="box"
            style="font-size: 13px"
          >
            Focus
          </button>
          <button
            class="pattern-chip rounded-pill px-4 py-2 font-label-sm text-on-surface-variant border-0 text-center"
            data-pattern="relaxing"
            style="font-size: 13px"
          >
            Relax
          </button>
        </div>
        <!-- Pattern Description -->
        <div class="text-center mb-4" style="height: 20px">
          <p
            id="pattern-desc"
            class="font-body-md text-on-surface-variant transition-opacity duration-300"
            style="font-size: 13px; opacity: 0.6; margin: 0"
          >
            <!-- Description injected by JS -->
          </p>
        </div>

        <!-- Custom Center Controls -->
        <div
          class="flex flex-wrap md:flex-nowrap items-center justify-between mt-2 w-full mx-auto"
          style="max-width: 420px"
        >
          <!-- Left side: Timer Badge (Clickable) -->
          <div
            class="flex justify-center md:justify-end !order-2 md:!order-1"
            style="flex: 1"
          >
            <button
              id="timer-badge"
              class="btn-press flex items-center justify-center gap-2 bg-surface-container/60 backdrop-blur-xl py-2 px-4 rounded-pill shadow-lg border-0"
              style="cursor: pointer; background: rgba(30, 41, 59, 0.6)"
              data-bs-toggle="modal"
              data-bs-target="#timerModal"
            >
              <span
                class="material-symbols-outlined text-on-surface-variant fs-5"
                >timer</span
              >
              <span
                id="timer-display"
                class="font-label-sm text-on-surface-variant tracking-widest mb-0"
                style="font-size: 13px"
                >10:00</span
              >
            </button>
          </div>

          <!-- Center: Primary Play/Pause Button -->
          <div
            class="flex justify-center !order-1 md:!order-2 w-full md:!w-auto !mb-4 md:!mb-0 px-3"
          >
            <button
              id="play-pause-btn"
              class="btn btn-press rounded-circle bg-primary flex items-center justify-center text-white hover:bg-primary-container transition-all duration-300"
              style="
                width: 72px;
                height: 72px;
                border: none;
                box-shadow: 0 4px 20px rgba(var(--color-primary), 0.4);
              "
            >
              <span
                class="material-symbols-outlined fs-1"
                style="font-variation-settings: 'FILL' 1"
                >play_arrow</span
              >
            </button>
          </div>

          <!-- Right side: Sound Settings Capsule -->
          <div
            class="flex justify-center md:justify-start !order-3 md:!order-3"
            style="flex: 1"
          >
            <div
              class="flex items-center justify-center bg-surface-container/60 backdrop-blur-xl py-2 px-3 rounded-pill shadow-lg border-0"
              style="background: rgba(30, 41, 59, 0.6)"
            >
              <button
                id="sound-toggle"
                class="btn p-0 border-0 text-white hover:text-primary transition-colors flex items-center justify-center"
                style="opacity: 0.9"
              >
                <span
                  class="material-symbols-outlined fs-5"
                  style="font-variation-settings: 'FILL' 0"
                  >volume_off</span
                >
              </button>
              <div
                id="volume-slider-container"
                class="volume-slider-container flex items-center transition-all duration-300 ms-2 !w-[50px] md:!w-[60px]"
                style="opacity: 1"
              >
                <input
                  type="range"
                  id="volume-slider"
                  min="0"
                  max="1"
                  step="0.01"
                  value="0.5"
                  class="volume-slider accent-primary !w-full"
                />
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- Timer Selection Modal (Bootstrap) -->
    <div
      class="modal fade"
      id="timerModal"
      tabindex="-1"
      aria-labelledby="timerModalLabel"
      aria-describedby="timerModalDesc"
    >
      <div class="modal-dialog modal-dialog-centered modal-sm">
        <div
          class="modal-content border-0 rounded-4 shadow-lg"
          style="
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(24px);
          "
        >
          <div class="modal-header border-0 pb-0 pt-4 px-4">
            <h5
              id="timerModalLabel"
              class="modal-title font-headline-sm text-on-surface"
              style="
                font-family: &quot;Playfair Display&quot;, serif;
                font-size: 20px;
              "
            >
              Session Timer
            </h5>
            <button
              type="button"
              class="btn-close btn-close-white opacity-50"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <p
            id="timerModalDesc"
            class="px-4 mt-1 mb-0 text-on-surface-variant"
            style="font-size: 13px; opacity: 0.6"
          >
            Choose your meditation duration
          </p>
          <div class="modal-body px-4 pb-4 pt-2">
            <p
              class="text-on-surface-variant mb-2 px-1"
              style="font-size: 12px; opacity: 0.6"
            >
              Session Duration
            </p>
            <div class="d-flex flex-column gap-2">
              <button
                class="timer-option btn btn-press text-start rounded-3 px-4 py-3 text-on-surface font-label-md d-flex justify-content-between align-items-center"
                data-minutes="5"
                style="background: rgba(255, 255, 255, 0.04); font-size: 14px"
              >
                <span>5 Minutes</span>
                <span
                  class="text-on-surface-variant"
                  style="font-size: 12px; opacity: 0.5"
                  >Quick</span
                >
              </button>
              <button
                class="timer-option btn btn-press text-start rounded-3 px-4 py-3 text-on-surface font-label-md d-flex justify-content-between align-items-center active"
                data-minutes="10"
                style="
                  background: rgba(var(--color-primary), 0.1);
                  font-size: 14px;
                "
              >
                <span>10 Minutes</span>
                <span class="text-primary" style="font-size: 12px; opacity: 0.7"
                  >Recommended</span
                >
              </button>
              <button
                class="timer-option btn btn-press text-start rounded-3 px-4 py-3 text-on-surface font-label-md d-flex justify-content-between align-items-center"
                data-minutes="15"
                style="background: rgba(255, 255, 255, 0.04); font-size: 14px"
              >
                <span>15 Minutes</span>
                <span
                  class="text-on-surface-variant"
                  style="font-size: 12px; opacity: 0.5"
                  >Extended</span
                >
              </button>
              <button
                class="timer-option btn btn-press text-start rounded-3 px-4 py-3 text-on-surface font-label-md d-flex justify-content-between align-items-center"
                data-minutes="20"
                style="background: rgba(255, 255, 255, 0.04); font-size: 14px"
              >
                <span>20 Minutes</span>
                <span
                  class="text-on-surface-variant"
                  style="font-size: 12px; opacity: 0.5"
                  >Deep</span
                >
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Timer Complete Overlay -->
    <div
      class="modal fade"
      id="themeModal"
      tabindex="-1"
      aria-labelledby="themeModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered modal-sm">
        <div
          class="modal-content border-0 rounded-4 shadow-lg"
          style="
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(24px);
          "
        >
          <div class="modal-header border-0 pb-0 pt-4 px-4">
            <h5
              id="themeModalLabel"
              class="modal-title font-headline-sm text-on-surface"
              style="
                font-family: &quot;Playfair Display&quot;, serif;
                font-size: 20px;
              "
            >
              Environment
            </h5>
            <button
              type="button"
              class="btn-close btn-close-white opacity-50"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <p
            class="px-4 mt-1 mb-0 text-on-surface-variant"
            style="font-size: 13px; opacity: 0.6"
          >
            Select a soundscape
          </p>
          <div class="modal-body px-4 pb-4 pt-3">
            <div class="d-flex flex-column gap-2" id="theme-list">
              <!-- Themes injected by JS -->
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Timer Complete Overlay -->
    <div id="timer-complete-overlay" class="timer-complete-overlay">
      <div class="text-center">
        <p class="complete-text mb-3">Session Complete</p>
        <p
          class="text-on-surface-variant"
          style="font-size: 14px; opacity: 0.6"
        >
          Take a moment before returning.
        </p>
        <button
          id="dismiss-complete"
          class="btn btn-press rounded-pill px-5 py-2 mt-4 text-white font-label-md bg-primary"
          style="border: none; font-size: 13px"
        >
          Return
        </button>
      </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom JS -->
    <script src="app.js"></script>
  </body>
</html>
